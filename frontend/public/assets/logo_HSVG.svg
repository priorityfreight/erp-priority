  <!-- text -->
  <g class="brand" transform="translate(780,115)">
    <text x="0" y="95" fill="#E5E5E5" font-size="132" font-weight="800" letter-spacing="10">PRIORITY</text>
    <text x="20" y="190" fill="#CFCFCF" font-size="50" font-weight="300" letter-spacing="7">FREIGHT INTELLIGENCE</text>
    <line x1="8" y1="232" x2="765" y2="232" stroke="#CFCFCF" stroke-width="3"/>
    <text x="36" y="298" fill="#E5E5E5" font-size="34" font-weight="400" letter-spacing="4">SMARTER • BETTER • FASTER</text>
