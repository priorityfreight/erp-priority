      <path d="M61 26H77V42H61Z" fill="#25344C" stroke="#E5E5E5" stroke-width="2"/>
    </g>

    <!-- truck aligned to orbit -->
    <g transform="translate(555,282) rotate(0)">
      <rect x="0" y="18" width="58" height="34" rx="3" fill="#25344C" stroke="#E5E5E5" stroke-width="2"/>
      <path d="M58 28H82L94 40V52H58V28Z" fill="#25344C" stroke="#E5E5E5" stroke-width="2" stroke-linejoin="round"/>
      <rect x="71" y="31" width="12" height="10" fill="#E5E5E5"/>
