      <path d="M331 76C292 76 279 103 280 123C304 118 319 108 334 88C330 83 329 79 331 76Z" fill="transparent" stroke="#0B1F3B" stroke-width="7" stroke-linecap="round"/>
      <path d="M273 140C236 140 216 171 214 199C260 200 295 184 321 152" fill="transparent" stroke="#0B1F3B" stroke-width="7" stroke-linecap="round"/>
      <path d="M220 239C252 229 287 231 321 248" fill="transparent" stroke="#0B1F3B" stroke-width="7" stroke-linecap="round"/>
      <path d="M236 331C264 302 297 294 321 299" fill="transparent" stroke="#0B1F3B" stroke-width="7" stroke-linecap="round"/>
    </g>

    <!-- right brain -->
    <g>
      <path d="M394 50C427 33 474 43 493 75C520 72 549 85 565 109C581 133 582 164 570 187C590 209 595 245 580 273C570 292 553 305 532 309C531 339 511 367 480 378C449 389 417 379 397 355L394 50Z" fill="url(#brainR)"/>
      <path d="M394 50C427 33 474 43 493 75C520 72 549 85 565 109C581 133 582 164 570 187C590 209 595 245 580 273C570 292 553 305 532 309C531 339 511 367 480 378C449 389 417 379 397 355" stroke="#0B1F3B" stroke-width="8" stroke-linejoin="round"/>
      <path d="M395 150H444L485 103" stroke="#27344C" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M445 150H515" stroke="#27344C" stroke-width="8" stroke-linecap="round"/>
      <path d="M396 242H458L507 193H558" stroke="#27344C" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M445 242L484 299" stroke="#27344C" stroke-width="8" stroke-linecap="round"/>
      <path d="M485 299L530 344" stroke="#27344C" stroke-width="8" stroke-linecap="round"/>
      <circle cx="445" cy="150" r="22" fill="#F5F2F2" stroke="#27344C" stroke-width="8"/>
      <circle cx="507" cy="103" r="22" fill="#F5F2F2" stroke="#27344C" stroke-width="8"/>
      <circle cx="558" cy="193" r="22" fill="#F5F2F2" stroke="#27344C" stroke-width="8"/>
      <circle cx="438" cy="242" r="22" fill="#F5F2F2" stroke="#27344C" stroke-width="8"/>
      <circle cx="521" cy="344" r="22" fill="#F5F2F2" stroke="#27344C" stroke-width="8"/>
    </g>

