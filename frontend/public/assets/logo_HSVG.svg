<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="520" viewBox="0 0 1600 520" fill="none">
  <defs>
    <linearGradient id="orbitGrad" x1="10" y1="320" x2="640" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#800020"/>
      <stop offset="0.55" stop-color="#B33A5B"/>
      <stop offset="1" stop-color="#909EAE"/>
    </linearGradient>
    <linearGradient id="brainR" x1="380" y1="30" x2="580" y2="390" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#D7DCE3"/>
      <stop offset="1" stop-color="#7A8798"/>
    </linearGradient>
    <linearGradient id="brainL" x1="150" y1="40" x2="360" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#B01244"/>
      <stop offset="1" stop-color="#800020"/>
    </linearGradient>
    <style>
      .brand { font-family: Montserrat, Gotham, Arial, sans-serif; }
    </style>
  </defs>

  <!-- symbol -->
  <g transform="translate(10,10)">
