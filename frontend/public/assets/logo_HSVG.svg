      <path d="M0 42H104L91 72H22L0 42Z" fill="#25344C" stroke="#E5E5E5" stroke-width="2"/>
      <path d="M18 30H34V42H18Z" fill="#25344C" stroke="#E5E5E5" stroke-width="2"/>
