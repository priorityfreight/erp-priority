    <path d="M596 84C620 82 646 82 670 86" stroke="#E5E5E5" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
    <path d="M601 94C623 93 645 95 665 99" stroke="#E5E5E5" stroke-width="3" stroke-linecap="round" opacity="0.75"/>
